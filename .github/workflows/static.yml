# .github/workflows/deploy.yml
# Place this file at: .github/workflows/deploy.yml in your repository

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]          # or "master" — whichever is your default branch
  workflow_dispatch:            # lets you trigger manually from the Actions tab

# Force Node.js 24 now, ahead of the June 2026 mandatory cutover
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs but don't cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site files
        uses: actions/upload-pages-artifact@v3    # v3 already runs on Node 20/24
        with:
          path: "."                               # upload entire repo root
                                                  # change to e.g. "./dist" if you build first

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
